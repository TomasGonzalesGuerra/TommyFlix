<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TommyFlix.Web</title>
    <base href="/" />
    <link rel="stylesheet" href="css/app.css" />

    <link href="TommyFlix.Web.styles.css" rel="stylesheet" />
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>

        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>

    <script src="_framework/blazor.webassembly.js"></script>
    <script>
        window.sideScroll = function (element, direction) {
            const scrollAmount = element.clientWidth * 0.8; // Cuánto avanzar
            const target = element.scrollLeft + (direction * scrollAmount);

            element.scrollTo({
                left: target,
                behavior: 'smooth' // El navegador gestiona la aceleración
            });
        };
    </script>
    <script>
        window.toggleFullScreen = function () {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else if (document.exitFullscreen) {
                document.exitFullscreen();
            }
        };
    </script>
    <script>
        window.videoHelpers = {
            getProgressBarX: function (element) {
                var rect = element.getBoundingClientRect();
                return { left: rect.left, width: rect.width };
            },
            setVideoTime: function (video, seconds) {
                video.currentTime = seconds;
            },
            getVideoData: function (video) {
                return {
                    currentTime: video.currentTime,
                    duration: video.duration || 0
                };
            }
        };
    </script>
</body>

</html>
